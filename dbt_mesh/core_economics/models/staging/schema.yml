version: 2

models:
  - name: stg_economic_indicators
    description: >
      Cleaned and type-cast raw source data. No business logic — only
      renaming, casting, and NULL filtering on the natural grain
      (country_code × year). Internal to core_economics; never exposed
      cross-project.
    group: data_engineering
    access: protected           # only models within core_economics can ref this

    config:
      materialized: view

    meta:
      owner: data-engineering
      domain: economic-indicators
      source: World Bank Open Data API

    columns:
      - name: country_code
        description: ISO 3166-1 alpha-2 code (e.g. CO, BR, US).
        tests:
          - not_null
          - accepted_values:
              values: ['CO','BR','MX','AR','CL','PE','EC','US','CN','DE']
      - name: country_name
        tests:
          - not_null
      - name: year
        description: Calendar year, integer.
        tests:
          - not_null
      - name: gdp_usd
        description: GDP in current USD (cast from gdp_current_usd).
      - name: gdp_per_capita_usd
      - name: inflation_pct
        description: Annual CPI inflation rate (%).
      - name: unemployment_pct
        description: ILO modelled unemployment rate (%).
      - name: population
        description: Total mid-year population estimate.
