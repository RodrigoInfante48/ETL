name: 'reporting_layer'
version: '1.0.0'
config-version: 2

profile: 'reporting_layer'

model-paths: ["models"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

tests:
  +severity: error

models:
  reporting_layer:
    reports:
      +materialized: view       # reporting models stay as views — email automation
      +access: protected        # nothing downstream of reporting_layer
      +tags: ["reports", "email"]
