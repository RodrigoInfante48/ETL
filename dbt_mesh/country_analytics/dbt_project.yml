name: 'country_analytics'
version: '1.0.0'
config-version: 2

profile: 'country_analytics'

model-paths: ["models"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

tests:
  +severity: error

models:
  country_analytics:
    marts:
      +materialized: table
      +access: public           # expose marts upstream to reporting_layer
      +tags: ["marts", "country_analytics"]
