name: 'world_bank_dbt'
version: '1.0.0'
config-version: 2

profile: 'world_bank_dbt'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]
metric-paths: ["metrics"]           # MetricFlow metrics in metrics/economic_metrics.yml

clean-targets:
  - "target"
  - "dbt_packages"

# ---------------------------------------------------------------------------
# on-run-end: fires after `dbt test`, `dbt build`, and `dbt run`.
# The macro inspects results[], filters for test nodes, and logs a summary.
# ---------------------------------------------------------------------------
on-run-end:
  - "{{ alert_on_test_failure() }}"

# ---------------------------------------------------------------------------
# Global test defaults.
# Individual tests can override severity in their own config: block.
#   severity: error  → command exits non-zero (blocks CI)
#   severity: warn   → logged but command exits 0 (advisory, never blocks CI)
# ---------------------------------------------------------------------------
tests:
  world_bank_dbt:
    +severity: error   # default; override per-test where a warning is enough

models:
  world_bank_dbt:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: view
      +schema: intermediate
    marts:
      +materialized: table
      +schema: marts
