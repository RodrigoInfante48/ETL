version: 2

# ---------------------------------------------------------------------------
# Intermediate model: int_country_metrics
# Enriches the staging layer with derived metrics.
# Not intended for direct consumption by BI tools — use marts instead.
# ---------------------------------------------------------------------------

models:

  - name: int_country_metrics
    description: >
      Intermediate model that enriches stg_economic_indicators with
      business-logic-derived metrics. Three categories of additions:
        1. Year-over-year growth rates (GDP and GDP per capita) via LAG()
           window functions partitioned by country.
        2. Composite economic_health_score (0–100 scale) that collapses
           four indicators into a single welfare index per country/year.
        3. is_latam boolean flag to segment the LATAM cohort.
      This model is the single source of truth for derived metrics consumed
      by both mart_country_summary and mart_global_trend.
      Materialised as a view (derives cheaply from the staging view).
      Grain: country_code × year (unique combination, inherited from staging).
    meta:
      owner: data-engineering
      domain: economic-indicators
      freshness_sla: daily
      source: World Bank Open Data API
      layer: intermediate
    tags:
      - economic
      - latam
      - world_bank
      - intermediate
    columns:

      # -----------------------------------------------------------------------
      # Pass-through columns (typed and renamed in staging; logic unchanged here)
      # -----------------------------------------------------------------------

      - name: country_code
        description: >
          ISO 3166-1 alpha-2 country code. Inherited from stg_economic_indicators.
          Partition key for all window functions in this model.
        data_tests:
          - not_null

      - name: country_name
        description: >
          Full English country name. Inherited from stg_economic_indicators.

      - name: year
        description: >
          Calendar year (integer, 2000–2023). Order key for all window functions.
          Together with country_code it forms the unique grain.
        data_tests:
          - not_null

      - name: gdp_usd
        description: >
          GDP in current USD. Inherited from stg_economic_indicators.
          Used as the base value for gdp_growth_pct (LAG reference).

      - name: gdp_per_capita_usd
        description: >
          GDP per capita in current USD. Inherited from stg_economic_indicators.
          Used as the base value for gdp_per_capita_growth_pct and as the
          primary input to the economic_health_score formula (50% weight).

      - name: inflation_pct
        description: >
          Annual inflation rate (%). Inherited from stg_economic_indicators.
          Input to the economic_health_score formula (25% weight, penalises
          deviation from the 2% ideal rate).

      - name: unemployment_pct
        description: >
          Unemployment rate (%). Inherited from stg_economic_indicators.
          Input to the economic_health_score formula (25% weight, penalises
          rates above 5%).

      - name: population
        description: >
          Total population. Inherited from stg_economic_indicators.

      # -----------------------------------------------------------------------
      # Derived metrics — added in this intermediate layer
      # -----------------------------------------------------------------------

      - name: gdp_growth_pct
        description: >
          Year-over-year GDP growth rate (%) for this country.
          Formula: (gdp_usd_t − gdp_usd_t-1) / gdp_usd_t-1 × 100
          Computed via LAG(gdp_usd) OVER (PARTITION BY country_code ORDER BY year).
          NULL for the first year of data per country (no prior-year reference).
          Negative values indicate economic contraction. Rounded to 2 decimals.

      - name: gdp_per_capita_growth_pct
        description: >
          Year-over-year GDP per capita growth rate (%) for this country.
          Formula: (gdp_pc_t − gdp_pc_t-1) / gdp_pc_t-1 × 100
          Complements gdp_growth_pct by factoring out population changes.
          NULL for the first year per country. Rounded to 2 decimals.

      - name: economic_health_score
        description: >
          Composite economic welfare index on a 0–100 scale. Higher = healthier.
          Three-component formula:

            Component 1 — GDP per capita (weight 50%):
              least(gdp_per_capita_usd / 80 000 × 50, 50)
              Normalised to a $80 k ceiling (≈ top of the dataset range).
              A country at $80 k per capita contributes the full 50 points.

            Component 2 — Inflation (weight 25%):
              greatest(25 − |inflation_pct − 2| × 2, 0)
              Ideal inflation is 2% (central bank target). Each percentage
              point of deviation subtracts 2 points; floored at 0.
              NULLs replaced with 5% (conservative imputation).

            Component 3 — Unemployment (weight 25%):
              greatest(25 − unemployment_pct × 2, 0)
              Ideal unemployment is 0%; each point subtracts 2; floored at 0.
              NULLs replaced with 10% (conservative imputation).

          Combined: component1 + component2 + component3, rounded to 1 decimal.
          Validated by tests/singular/assert_health_score_bounds.sql to remain
          within [0, 100] for all rows.

      - name: is_latam
        description: >
          Boolean flag — TRUE when country_code is one of the 7 Latin American
          countries in scope: CO, BR, MX, AR, CL, PE, EC.
          FALSE for USA (US), China (CN), Germany (DE).
          Used as a cohort filter throughout the mart and reporting layers.
          Validated by tests/singular/assert_latam_gdp_not_null.sql, which
          ensures LATAM rows never have a NULL gdp_usd.
