version: 2

models:

  - name: mart_country_summary
    description: >
      Final country-level analytical model with historical averages, latest-year
      snapshot, and performance classification. One row per country.
    columns:

      - name: country_code
        description: "ISO 2-letter country code"
        data_tests:
          - unique
          - not_null

      - name: performance_tier
        description: "Economic performance classification based on latest health score"
        data_tests:
          - accepted_values:
              values: ['High Performer', 'Mid Performer', 'Developing', 'Needs Attention']

      - name: latest_health_score
        description: "Economic health score 0-100 for the latest reported year"
        data_tests:
          - not_null

      - name: last_year
        description: "Most recent year of data for this country"
        data_tests:
          # Freshness proxy: if no country has data after 2020 the ETL is stale.
          - dbt_expectations.expect_column_max_to_be_between:
              min_value: 2020
              max_value: 2024
              config:
                severity: warn
                alias: mart_country_summary_freshness
          # Referential integrity: every last_year must exist in mart_global_trend.
          - relationships:
              to: ref('mart_global_trend')
              field: year
              config:
                severity: error
                alias: last_year_refs_global_trend

  - name: mart_global_trend
    description: "Global yearly economic aggregates for time-series analysis."
    columns:

      - name: year
        description: "Reference year"
        data_tests:
          - unique
          - not_null
